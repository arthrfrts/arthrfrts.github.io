<article class="wrapper post">
  {% if post.title != "" %}
    <header class="post_header">
      <h2 class="post_title">
        <a href="{{ post.url | relative_url }}" rel="bookmark">
          {{ post.title }}
        </a>
      </h2>
    </header>
  {% endif %}
  
  <div class="post_body">
    {% if include.archive and post.title != "" %}
      {{ post.excerpt }}
    {% else %}
      {{ post.content }}
    {% endif %}
  </div>
  
  {% include post/infos.html post=post %}
</article>
