<!DOCTYPE html>
<html lang="{{ site.lang }}" {%- if page.layout %} class="site {{ page.layout | prepend: 'layout_' }}"{% endif %}>
  {% include head.html %}
  <body>
    {% include header.html %}
    
    <main class="content" role="main">
      {{ content }}
    </main>
    
    {% include footer.html %}
    
    {% if content contains "iframe" %}
      <script src="{% link assets/js/embeds.js %}"></script>
    {% endif %}
  </body>
</html>
